<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Work | Evelyn Animation</title>
  <link rel="stylesheet" href="site.css">
</head>
<body>

<div id="cursor"></div>
<nav id="nav"></nav>

<div class="page-hero">
  <h1>The Gallery</h1>
  <p>High-end creative works and cinematics.</p>
</div>

<div class="section">
  <div class="filter-row">
    <button class="filter-btn active" onclick="filterGallery('all',this)">All Work</button>
    <button class="filter-btn" onclick="filterGallery('renders',this)">3D Renders</button>
    <button class="filter-btn" onclick="filterGallery('rigs',this)">Custom Rigs</button>
    <button class="filter-btn" onclick="filterGallery('videos',this)">Videos</button>
  </div>
  <div id="gallery-grid" class="gallery-grid"></div>
</div>

<div id="lightbox">
  <button class="lb-close" onclick="closeLightbox()">&times;</button>
  <div class="lb-wrap">
    <div id="lb-media"></div>
    <div class="lb-info">
      <h2 id="lb-title"></h2>
      <div id="lb-desc"></div>
    </div>
  </div>
</div>

<footer id="footer"></footer>

<script src="content.js"></script>
<script src="site.js"></script>
<script>
  initCursor();
  buildNav('work.html');
  buildFooter();
  buildGallery();
  initLightbox();
</script>
</body>
</html>
